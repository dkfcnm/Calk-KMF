name: Commit Message Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-commit-messages:
    name: Check commit messages
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit message format
        run: |
          set -e

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            commits=$(git rev-list "$base_sha".."$head_sha")
          else
            before="${{ github.event.before }}"
            after="${{ github.event.after }}"
            commits=$(git rev-list "$before".."$after")
          fi

          exit_code=0
          for commit in $commits; do
            message=$(git log -1 --pretty=format:"%B" "$commit")
            first_line=$(echo "$message" | head -n 1)

            echo "Checking commit $commit: $first_line"

            if echo "$first_line" | grep -qE '^\[(ADD|FIX|REFACT|PERF|TEST|DOCS|DB|CONFIG)\] .+'; then
              :
            elif echo "$first_line" | grep -qE '^Merge pull request .+'; then
              :
            elif echo "$first_line" | grep -qE '^Initial commit.*'; then
              :
            else
              echo "ERROR: Commit message does not match the required format."
              echo "  First line: $first_line"
              echo ""
              echo "Expected format: [TYPE] Short description"
              echo "Allowed types: [ADD], [FIX], [REFACT], [PERF], [TEST], [DOCS], [DB], [CONFIG]"
              exit_code=1
            fi

            if [ ${#first_line} -gt 72 ]; then
              echo "ERROR: First line is longer than 72 characters (${#first_line} chars):"
              echo "  $first_line"
              exit_code=1
            fi
          done

          if [ $exit_code -ne 0 ]; then
            exit 1
          fi

          echo "All commit messages are valid."
