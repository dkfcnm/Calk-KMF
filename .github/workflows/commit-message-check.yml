name: Commit Message Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-commit-messages:
    name: Check commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: gsactions/commit-message-checker@v2
        with:
          pattern: '^\[(ADD|FIX|REFACT|PERF|TEST|DOCS|DB|CONFIG)\] .+|^Merge pull request .+|^Initial commit.*'
          flags: 'gms'
          error: |
            Commit message does not match the required format.

            Expected format:
              [TYPE] Short description (up to 72 characters)

              Detailed description...

            Allowed types:
              [ADD]    — new feature
              [FIX]    — bug fix
              [REFACT] — refactoring
              [PERF]   — performance improvement
              [TEST]   — tests
              [DOCS]   — documentation
              [DB]     — database schema/migration
              [CONFIG] — configuration, dependencies, CI/CD

            Examples:
              [ADD] Implement monthly flying stars calculation
              [FIX] Correct day pillar boundary at solar term change

      - name: Check commit message length
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            commits=$(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          else
            commits=$(git rev-list ${{ github.event.before }}..${{ github.event.after }})
          fi

          exit_code=0
          for commit in $commits; do
            message=$(git log -1 --pretty=format:"%s" $commit)
            first_line=$(echo "$message" | head -n 1)
            if [ ${#first_line} -gt 72 ]; then
              echo "ERROR: First line of commit $commit is longer than 72 characters:"
              echo "  $first_line"
              exit_code=1
            fi
          done

          if [ $exit_code -ne 0 ]; then
            echo "Please keep the first line of commit messages within 72 characters."
            exit 1
          fi
